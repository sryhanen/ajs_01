<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Page Not Found</title>
    <style>
      body {
        margin: 0;
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
        background: #F7FAFC;
      }

      .container {
        --bs-gutter-x: 1.5rem;
        --bs-gutter-y: 0;
        width: 100%;
        padding-right: calc(var(--bs-gutter-x) * .5);
        padding-left: calc(var(--bs-gutter-x) * .5);
        margin-right: auto;
        margin-left: auto;
      }

      @media (min-width: 992px) {
        .container {
          max-width: 960px;
        }
      }

      @media (min-width: 768px) {
        .container {
          max-width: 720px;
        }
      }

      @media (min-width: 576px) {
        .container {
          max-width: 540px;
        }
      }

      .container-box {
        background: white;
        box-shadow: 0 1px 10px #CBD5E0;
        padding: 30px 20px;
        border-radius: 20px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        margin-top: calc(-1 * var(--bs-gutter-y));
        margin-right: calc(-.5 * var(--bs-gutter-x));
        margin-left: calc(-.5 * var(--bs-gutter-x));
      }

      .row > * {
        flex-shrink: 0;
        width: 100%;
        max-width: 100%;
        padding-right: calc(var(--bs-gutter-x) * .5);
        padding-left: calc(var(--bs-gutter-x) * .5);
        margin-top: var(--bs-gutter-y);
      }

      .col {
        flex: 1 0 0;
      }

      h1 {
        margin: 0 10px;
        font-size: 50px;
        text-align: center;
      }

      p {
        margin: 1em 0;
      }
    </style>
  </head>
  <body>

  <div class="container">
    <div class="container-box">
      <div class="row">
        <div class="col">
          <h1>404</h1>
          <p>Sorry, the page you are looking for could not be found or does not exist.</p>
        </div>
        <div class="col">
          <img src="" alt="404 picture" />
        </div>
      </div>
    </div>
  </div>

  </body>
</html>
