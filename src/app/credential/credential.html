<div id="credentialPage" class="container-fluid ">
  <div class="settings-header mt-5 mb-4">
    <div class="header-top">
      <div class="row">
        <div class="col-md-12">
          <h1 class="float-start me-3">
            Credentials
            <a role="button"
               class="fs-6 align-text-top"
               target="_blank" ng-href="{{getCredentialDocsLink()}}"
               title="Learn more">
              <i class="fas fa-question-circle"></i>
            </a>
          </h1>
          <button class="btn btn-primary btn-sm mb-2"
                  ng-click="toggleAddNewCredentialInfo()">
            <i class="fas fa-plus"></i>
            Add
          </button>
        </div>
      </div>
      <div class="row">
        <div class="col-md-12">
          <p>Manage your credentials. You can add new credential information.</p>
        </div>
      </div>
    </div>

    <!--Credential addition form-->
    <div class="row interpreter">
      <div class="col-md-12"
           ng-show="showAddNewCredentialInfo">
        <div class="header-bottom">
          <h2>Add new credential</h2>
          <div class="row interpreter">
            <div class="col-4">
              <label class="form-label"
                     for="entityName">
                Entity *
              </label>
              <input id="entityName"
                     ng-model="entity"
                     class="form-control"
                     placeholder="[Interpreter Group].[Interpreter Name]" />
            </div>
            <div class="col-4">
              <label class="form-label"
                     for="entityUsername">
                Username *
              </label>
              <input id="entityUsername"
                     class="form-control"
                     ng-model="username" />
            </div>
            <div class="col-4">
              <label class="form-label"
                     for="entityPassword">
                Password *
              </label>
              <input type="password"
                     id="entityPassword"
                     class="form-control"
                     ng-model="password" />
            </div>
          </div>
          <hr class="my-3" />
          <div class="text-end">
            <button class="btn btn-light me-2"
                    ng-click="cancelCredentialInfo()">
              Cancel
            </button>
            <button class="btn btn-primary"
                    ng-click="addNewCredentialInfo()">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="box mb-5">
    <div class="row">
      <div ng-show="!hasCredential(credentialInfo)"
           class="col-md-12 text-muted text-center">
        <p>
          <img src="../../assets/images/undraw_empty.svg"
               width="500px"
               alt="currently empty" />
        </p>
        <p><i>Currently, there are no credentials created.</i></p>
      </div>
      <div class="col-md-12"
           ng-show="hasCredential(credentialInfo) || show >= 0">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Entity</th>
              <th>Username</th>
              <th>Password</th>
              <th class="text-end">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr ng-repeat="credential in credentialInfo">
              <td class="align-middle">
                <span>{{credential.entity}}</span>
              </td>
              <td class="align-middle">
                <input class="form-control"
                       type="text"
                       ng-show="show === $index"
                       ng-model="editable.username"
                       value="{{editable.username}}"
                       />
                <span ng-show="show !== $index">
                  {{credential.username}}
                </span>
              </td>
              <td class="align-middle">
                <input class="form-control"
                       ng-show="show === $index"
                       ng-model="editable.password"
                       type="password"
                       value="{{editable.password}}"
                       />
                <span class="text-muted password"
                      ng-show="show !== $index">
                  <i class="fas fa-circle"></i>
                  <i class="fas fa-circle"></i>
                  <i class="fas fa-circle"></i>
                  <i class="fas fa-circle"></i>
                  <i class="fas fa-circle"></i>
                  <i class="fas fa-circle"></i>
                  <i class="fas fa-circle"></i>
                  <i class="fas fa-circle"></i>
                </span>
              </td>
              <td class="text-end">
                <!-- Edit credential info -->
                <span ng-show="show !== $index">
                  <button class="btn btn-secondary btn-sm me-2"
                          ng-click="show=$index; copyOriginCredentialsInfo(credential);">
                    <i class="fas fa-pen-to-square"></i>
                    Edit
                  </button>
                  <button class="btn btn-danger btn-sm"
                          ng-click="removeCredentialInfo(credential.entity)">
                    <i class="fas fa-trash-alt"></i>
                    Remove
                  </button>
                </span>
                <span ng-show="show === $index">
                    <button type="button"
                            class="btn btn-secondary btn-sm me-2"
                            ng-disabled="waiting"
                            ng-click="show=-1">
                      Cancel
                    </button>
                    <button type="submit"
                            class="btn btn-primary btn-sm"
                            ng-disabled="waiting"
                            ng-click="updateCredentialInfo(credential)">
                      Save
                    </button>
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Remove the credential -->
  <div class="modal fade"
       id="removeCredentialModal"
       tabindex="-1"
       aria-labelledby="removeCredentialModalLabel"
       aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"
              id="exampleModalLabel">
            Remove the credential
          </h5>
          <button type="button"
                  class="btn-close"
                  ng-click="removeCredentialInfoClose()"
                  aria-label="Close">
          </button>
        </div>
        <div class="modal-body">
          Do you want to delete this credential information?
        </div>
        <div class="modal-footer">
          <button type="button"
                  ng-click="removeCredentialInfoConfirm()"
                  class="btn btn-danger">
            Remove
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
