<div class="job mb-3">
  <div class="d-flex align-items-center">
    <div class="job-types">
      <i class="me-1" ng-class="$ctrl.getJobTypeIcon()"></i>
      <a ng-href="#/notebook/{{$ctrl.getNoteId()}}">
        <span ng-bind="$ctrl.getNoteName() + ' - '"></span>
        <span ng-bind="$ctrl.getInterpreterName()"></span>
      </a>
    </div>
    <!-- job control -->
    <div id="{{$ctrl.getNoteId()}}_control" class="control ms-auto">
      <span class="me-2" ng-bind="$ctrl.lastExecuteTime()"></span>
      <span ng-bind="$ctrl.isRunning() ? 'RUNNING' : 'READY'"></span>
      <span class="ms-2" ng-if="$ctrl.isRunning()" ng-bind="$ctrl.getProgress()"></span>
      <button class="btn btn-secondary btn-sm ms-2"
              ng-click="!$ctrl.isRunning() ? $ctrl.runJob() : $ctrl.stopJob()"
              title="Run all paragraphs">
        <i class="me-1"
           ng-class="!$ctrl.isRunning() ? 'fas fa-play' : 'fas fa-pause'"></i>
        Run all
      </button>
    </div>
  </div>
  <!-- job progress bar: start -->
  <div id="{{$ctrl.getNoteId()}}_runControl"
       class="run-control my-2">
    <div id="{{$ctrl.getNoteId()}}_progress"
         class="progress"
         ng-if="$ctrl.isRunning() === true">
      <div class="progress-bar"
           role="progressbar"
           ng-class="$ctrl.getClassNames()">
      </div>
    </div>
  </div>
  <!-- job progress bar: end -->
  <div class="paragraph-list">
    <span ng-repeat="paragraph in $ctrl.getParagraphs()">
      <a ng-href="#/notebook/{{$ctrl.getNoteId()}}?paragraph={{paragraph.id}}">
        <i ng-class="[$ctrl.getJobColorByStatus(paragraph.status), $ctrl.getJobIconByStatus(paragraph.status)]"
           title="{{paragraph.name}} is {{paragraph.status}}">
        </i>
      </a>
    </span>
  </div>
</div>
