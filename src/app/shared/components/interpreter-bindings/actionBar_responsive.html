<!-- interpreter restart -->
<div class="dropdown me-2" ng-click="getBindings()">
  <button class="btn btn-secondary dropdown-toggle"
          type="button"
          data-bs-toggle="dropdown"
          data-bs-auto-close="outside"
          ng-if="!revisionView"
          title="Interpreter restart">
    <i class="fas fa-rotate"></i>
    <!-- Preload indicator -->
    <span class="ms-2"
          ng-show = "note.paragraphs[0].title !== 'hideMeSparkPinger'">
      No preloading
    </span>
    <span class="ms-2"
          ng-show = "note.paragraphs[0].title === 'hideMeSparkPinger'">
      <span ng-show = "note.paragraphs[0].status !== 'FINISHED'">
        Booting Spark...
      </span>
      <span ng-show = "note.paragraphs[0].status === 'FINISHED'">
        Spark is ready
      </span>
    </span>
  </button>
  <div class="dropdown-menu dropdown-menu-end interpreter-binding">
    <h2 class="dropdown-header mt-0">
      Interpreter restart
    </h2>
    <div class="px-3"
         as-sortable="interpreterSelectionListeners"
         data-ng-model="interpreterBindings">
      <div class="d-flex mb-2"
           data-ng-repeat="item in interpreterBindingsUI.clone"
           as-sortable-item>
        <div class="w-75">
          {{item.name}}
          {{selectedInterpreterForDefaulting ? (selectedInterpreterForDefaulting===$index ? '(default)': '') : ($first? '(default)': '')}}
          <!-- removed that ugly chunk and moved the logic to controller -->
          <small class="text-muted"
                 ng-repeat="UIItem in interpreterBindingsUI.body[$index]">
            {{UIItem}}&nbsp;
          </small>
        </div>
        <div class="ms-auto">
          <i ng-click="saveSetting($index)"
             title="Make this interpreter the default"
             ng-class="selectedInterpreterForDefaulting ? (selectedInterpreterForDefaulting===$index ? 'fa-circle-dot': 'fa-circle') : ($first? 'fa-circle-dot': 'fa-circle')"
             class="fa-solid me-2"></i>
          <i ng-click="newRestartInterpreter(note, item)"
             title="Restart"
             class="fa-solid fa-rotate"></i>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- permissions -->
<button class="btn btn-secondary me-2"
        type="button"
        ng-click="togglePermissions()"
        ng-if="!revisionView"
        title="Notebook permissions">
  <i class="fas fa-unlock-keyhole">
  </i>
</button>
<!-- notebook view -->
<div class="dropdown">
  <button type="button"
          class="btn btn-secondary dropdown-toggle"
          data-bs-toggle="dropdown">
    {{note.config.looknfeel}}
  </button>
  <div class="dropdown-menu dropdown-menu-end"
       role="menu">
    <a class="dropdown-item"
       role="button"
       ng-click="setMode('default-mode', 'default')">
      Default
    </a>
    <a class="dropdown-item"
       role="button"
       ng-click="setMode('report-mode', 'report')">
      Report
    </a>
  </div>
</div>
