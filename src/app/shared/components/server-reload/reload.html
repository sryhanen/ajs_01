<div id="serverReloadNotification"
     class="modal fade"
     data-bs-backdrop="static"
     data-bs-keyboard="false"
     aria-labelledby="serverReloadNotificationLabel"
     aria-hidden="true"
     tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <!-- modal-header -->
      <div class="modal-header modal-header-reload">
        <h5 class="modal-title"
            id="serverReloadNotificationLabel">
          Server shutdown
        </h5>
      </div>
      <div class="modal-body modal-body-reload" ng-if="!asIframe">
        The server sent shutdown signal. Please, reload the page to continue.
      </div>
      <div class="modal-body modal-body-reload" ng-if="asIframe">
        <p>The server sent shutdown signal.</p>
        <p>Currently, you are on the paragraph results page.
          Please click the button below to return to the front page and reload the page.</p>
      </div>
      <div class="modal-footer" ng-if="asIframe">
        <button type="button"
                class="btn btn-primary"
                ng-click="reload()">
          Leave and reload
        </button>
      </div>
    </div>
  </div>
</div>
