<!-- Set the commit as a new Head -->
<div class="modal fade"
     id="setCommitModal"
     tabindex="-1"
     aria-labelledby="setCommitModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"
            id="setCommitModalLabel">
          Restore this save file
        </h5>
        <button type="button"
                class="btn-close"
                ng-click="close('setCommitModal')"
                aria-label="Close">
        </button>
      </div>
      <div class="modal-body">
        Do you want to restore this save file to be the current version?
      </div>
      <div class="modal-footer">
        <button type="button"
                class="btn btn-primary"
                ng-click="triggerCallback('setCommitModal')">
          Restore
        </button>
      </div>
    </div>
  </div>
</div>
