<div ng-controller="dragDropController"
     ng-init="init(config, tableDataColumns, save)">
  <div class="row">
    <div class="row mb-3">
      <div class="col-12 col-sm-4 col-lg-3 mb-3 mb-sm-0">
        <label class="form-label"
               for="fieldSelect">Field</label>
        <select class="form-select form-select-sm"
                id="fieldSelect"
                ng-model="selectionToAdd.item"
                ng-options="item.name for item in inputData">
        </select>
      </div>
      <div class="col-12 col-sm-3 col-lg-3 mb-3 mb-sm-0">
        <label class="form-label"
               for="sendToSelect">Send to</label>
        <select class="form-select form-select-sm"
                id="sendToSelect"
                ng-model="selectionToAdd.field"
                ng-options="zone.id for zone in zoneCollection">
        </select>
      </div>
      <div class="col-auto align-self-end">
        <button class="btn btn-secondary me-2"
                ng-click="reset()">
          Clear all
        </button>
        <button class="btn btn-primary"
                ng-click="addSelection()">
          Add
        </button>
      </div>
    </div>
    <div class="row h-100">
      <div class="col-12 col-sm-6 col-lg-3 mt-4 mt-lg-0"
           ng-repeat="zone in zoneCollection">
        <span class="badge bg-info text-info fs-6 mb-2">{{zone.id}}</span>
        <drop-zone class="d-block w-100 p-3 rounded-4 drop-column scatter-chart"
                   zone="zone"
                   add="dragitem">
          <draggable ng-repeat="item in zone.content track by $index"
                     dragdata="item"
                     class="badge d-flex w-100 bg-light text-dark">
            <span>{{item.name}}</span>
            <button class="btn btn-link btn-sm ms-auto p-0"
                    ng-click="removeItem(item.UUID)">
              <i class="fas fa-times"></i>
            </button>
          </draggable>
        </drop-zone>
      </div>
    </div>
  </div>
</div>
