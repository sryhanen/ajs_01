<!-- navbar -->
<nav class="navbar navbar-expand-lg fixed-top navbar-inverse" role="navigation">
  <div class="container-fluid " ng-controller="NavCtrl as navbar">
    <a href
       class="navbar-brand"
       ng-click="gotoHome()">
      <img src="../../../../assets/images/teragrep.png"
           alt="Teragrep"
      />
    </a>
    <button class="navbar-toggler ms-auto"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <i class="fas fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse"
         id="navbarSupportedContent"
         ng-if="!asIframe"
         ng-init="navbar.darkInit()">
      <ul class="navbar-nav me-auto" ng-if="ticket">
        <!-- menu: Notebook -->
        <li class="nav-item me-2">
          <a href=""
             class="nav-link navbar-menu-create px-3"
             ng-click="createNote()">
            <i class="fas fa-plus me-2"></i>
            Create
          </a>
        </li>
        <li class="nav-item dropdown notebook-list-dropdown" uib-dropdown>
          <button class="nav-link btn btn-link dropdown-toggle"
                  id="navbarDropdownMenuLink"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                  uib-dropdown-toggle>
            Notebooks
          </button>
          <ul class="dropdown-menu notebook-dropdown" aria-labelledby="navbarDropdownMenuLink">
            <li class="filter-names dropdown-item mb-2">
              <form>
                <span class="form-control-search">
                  <i class="fas fa-magnifying-glass"></i>
                </span>
                <input type="text"
                       class="note-name-query form-control rounded-pill"
                       ng-click="$event.stopPropagation()"
                       placeholder="Search a notebook"
                       ng-model="$parent.query.q"
                       ng-model-options="{ updateOn: 'default blur', debounce: { 'default': 300, 'blur': 0 } }" />
              </form>
            </li>
            <li ng-if="!query.q || query.q === ''"
                ng-repeat="node in navbar.notes.root.children"
                ng-class="{'active' : navbar.isActive(node.id)}"
                ng-include src="'/app/shared/components/navbar/navbar-note-list-elem.html'">
            </li>
            <li ng-if="query.q"
                ng-repeat="node in navbar.notes.flatList | filter : query.q | orderBy:navbar.arrayOrderingSrv.noteFlatListOrdering"
                ng-class="{'active' : navbar.isActive(node.id)}"
                ng-include src="'/app/shared/components/navbar/navbar-note-list-elem.html'">
            </li>
          </ul>
        </li>
        <!-- menu: Job -->
        <li class="nav-item">
          <a class="nav-link"
             href="#/jobmanager">
            Jobs
          </a>
        </li>
      </ul>
      <div class="d-flex flex-column flex-lg-row align-items-lg-center ms-auto">
        <ul class="navbar-nav">
          <li ng-if="ticket" class="nav-item dropdown">
            <i ng-if="navbar.connected"
               class="fas fa-circle server-connected align-middle"
               data-bs-toggle="tooltip"
               data-bs-placement="bottom"
               title="WebSocket Connected">
            </i>
            <i ng-if="!navbar.connected"
               class="fas fa-circle server-disconnected align-middle"
               data-bs-toggle="tooltip"
               data-bs-placement="bottom"
               title="WebSocket Disconnected">
            </i>
            <button class="nav-link btn btn-link dropdown-toggle"
                    type="button"
                    data-bs-toggle="dropdown"
                    id="dropdownUserBtn"
                    aria-expanded="false">
              <span class="username">
                {{ticket.screenUsername}}
              </span>
            </button>
            <span ng-if="ticket"></span>
            <ul class="dropdown-menu dropdown-menu-end"
                aria-labelledby="dropdownUserBtn">
              <li>
                <a class="dropdown-item"
                   data-bs-toggle="modal"
                   data-bs-target="#aboutModal">
                  About Teragrep
                </a>
              </li>
              <div id="admin-tools">
                <li class="divider">
                  <hr class="dropdown-divider" />
                </li>
                <li>
                  <a class="dropdown-item" href="#/interpreter">
                    <span class="drop-icon">
                      <i class="fas fa-code"></i>
                    </span>
                    Interpreter
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#/credential">
                    <span class="drop-icon">
                      <i class="fas fa-shield-alt"></i>
                    </span>
                    Credential
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#/configuration">
                    <span class="drop-icon">
                      <i class="fas fa-gear"></i>
                    </span>
                    Configuration
                  </a>
                </li>
              </div>
              <li class="divider">
                <hr class="dropdown-divider" />
              </li>
              <li class="dropdown-item">
                <span class="form-check form-switch">
                  <input class="form-check-input me-1"
                         ng-click="darkTheme()"
                         type="checkbox"
                         ng-model="navbar.checkValue"
                         [checked]="navbar.checkValue"
                         role="switch"
                         id="flexSwitchCheckDefault" />
                  <label class="form-check-label"
                         for="flexSwitchCheckDefault">
                    Dark Mode
                  </label>
                </span>
              </li>
              <li ng-if="ticket.principal && ticket.principal !== 'anonymous'"
                  class="divider">
                <hr class="dropdown-divider" />
              </li>
              <li ng-if="ticket.principal && ticket.principal !== 'anonymous'">
                <a class="dropdown-item" ng-click="navbar.logout()">
                  <span class="drop-icon">
                    <i class="fas fa-sign-out-alt"></i>
                  </span>
                  Logout
                </a>
              </li>
            </ul>
          </li>
          <li class="nav-item" ng-if="!ticket">
            <button class="btn btn-secondary"
                    ng-click="navbar.showLoginWindow()">
              Login
            </button>
          </li>
        </ul>
      </div>
    </div>
    <div class="collapse navbar-collapse" ng-if="asIframe">
      <div class="d-flex flex-column flex-lg-row align-items-lg-center ms-auto">
        <ul class="navbar-nav">
          <li class="nav-item" ng-if="!ticket">
            <button class="btn btn-secondary"
                    ng-click="navbar.showLoginWindow()">
              Login
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- about TG modal -->
<div id="aboutModal"
     class="modal fade"
     tabindex="-1"
     aria-labelledby="aboutModal"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <!-- about dialog header -->
      <div class="modal-header modal-header-about">
        <h5 class="modal-title">
          About Teragrep
        </h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close">
        </button>
      </div>
      <!-- about dialog body -->
      <div class="modal-body">
        <div class="row">
          <div class="hidden-xs col-sm-4 d-flex align-items-center justify-content-center">
            <img src="../../../../assets/images/avatar.png"
                 class="logo"
                 alt="Teragrep"
                 title="Teragrep" />
          </div>
          <div class="col-xs-12 col-sm-8 content">
            <h2>Teragrep</h2>
            <p>
              <span id="i18n-14">
                Version
              </span>
              <span class="modal-body-about-version">
                {{zeppelinVersion}}
              </span>
            </p>
            <p>
              <a href="https://github.com/teragrep"
                  target="_blank">
                Get involved!
              </a>
            </p>
            <p>
              <a href="https://github.com/teragrep/teragrep/blob/main/LICENSE" target="_blank">
                Licensed under the GNU Affero General Public License, Version 3.0
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
