<!-- basic login modal -->
<div id="loginModal"
     class="modal fade"
     tabindex="-1"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <!-- Modal content-->
    <div id="loginModalContent"
         class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          Login
        </h5>
        <button type="button"
                class="btn-close"
                ng-click="closeLogin('loginModal')"
                aria-label="Close">
        </button>
      </div>
      <form class="modal-body">
        <div class="row" ng-show="loginParams.errorText">
          <div class="col-12">
            <div class="alert alert-danger"
                 role="alert">
              {{loginParams.errorText}}
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-6">
            <label for="userName"
                   class="form-label">
              Username
            </label>
            <input placeholder="User Name"
                   type="text"
                   class="form-control"
                   id="userName"
                   required
                   ng-disabled="SigningIn"
                   ng-enter="login()"
                   ng-keypress="loginParams.errorText = ''"
                   ng-model="loginParams.userName" />
          </div>
          <div class="col-6">
            <label for="password"
                   class="form-label">
              Password
            </label>
            <input placeholder="Password"
                   type="password"
                   class="form-control"
                   id="password"
                   required
                   ng-disabled="SigningIn"
                   ng-enter="login()"
                   ng-keypress="loginParams.errorText = ''"
                   ng-model="loginParams.password" />
          </div>
        </div>
      </form>
      <div class="modal-footer"
           ng-switch on="SigningIn">
        <div ng-switch-when="true">
          <button type="button"
                  class="btn btn-primary"
                  disabled>
            <i class="fas fa-circle-notch fa-spinner"></i>
            Signing In
          </button>
        </div>
        <div ng-switch-default>
          <button type="button"
                  class="btn btn-primary"
                  ng-click="login()">
            Login
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- insufficient privileges -->
<div id="loginNoPermissionModal"
     class="modal fade"
     data-bs-backdrop="static"
     data-bs-keyboard="false"
     tabindex="-1"
     aria-labelledby="loginNoPermissionModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <!-- Modal content-->
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"
            id="loginNoPermissionModalLabel">
          Insufficient privileges
        </h5>
        <button type="button"
                class="btn-close"
                ng-click="closeLogin('loginNoPermissionModal')"
                aria-label="Close">
        </button>
      </div>
      <div class="modal-body">
        Please login to see the content.
      </div>
      <div class="modal-footer">
        <button type="button"
                class="btn btn-secondary"
                ng-click="closeNoLogin()">
          Cancel
        </button>
        <button type="button"
                class="btn btn-primary"
                ng-click="openLogin()">
          Login
        </button>
      </div>
    </div>
  </div>
</div>

<!-- logout successful -->
<div id="loginSuccessModal"
     class="modal fade"
     data-bs-backdrop="static"
     data-bs-keyboard="false"
     tabindex="-1"
     aria-labelledby="loginSuccessModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <!-- Modal content-->
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"
            id="loginSuccessModalLabel">
          Signing out
        </h5>
        <button type="button"
                class="btn-close"
                ng-click="closeLogin('loginSuccessModal')"
                aria-label="Close">
        </button>
      </div>
      <div class="modal-body">
        Logout success
      </div>
    </div>
  </div>
</div>

<!-- Confirm leaving -->
<div id="leaveSiteModal"
     class="modal fade"
     data-bs-backdrop="static"
     data-bs-keyboard="false"
     tabindex="-1"
     aria-labelledby="leaveSiteModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <!-- Modal content-->
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"
            id="leaveSiteLabel">
          Do you want to leave this site?
        </h5>
        <button type="button"
                class="btn-close"
                ng-click="closeLogin('leaveSiteModal')"
                aria-label="Close">
        </button>
      </div>
      <div class="modal-body">
        Changes that you have made will not be saved.
      </div>
      <div class="modal-footer">
        <button type="button"
                class="btn btn-primary"
                ng-click="leaveConfirm()">
          Leave
        </button>
      </div>
    </div>
  </div>
</div>
