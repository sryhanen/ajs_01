<div id="noteCloneModal"
     class="modal fade"
     targetinput="noteName"
     aria-labelledby="noteCloneModal"
     tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header modal-header-note-name">
        <h5 class="modal-title">
          Clone notebook
        </h5>
        <button type="button"
                class="btn-close"
                ng-click="closeModal()"
                aria-label="Close"></button>
      </div>
      <div class="modal-body modal-body-note-name">
        <div class="row mb-3">
          <div class="col-4">
            <label for="noteNameClone" class="col-form-label">
              Notebook name
            </label>
          </div>
          <div class="col-8">
            <input placeholder="Insert Note Name"
                   type="text"
                   class="form-control note-name-create-input"
                   id="noteNameClone"
                   ng-model="note.notename"
                   ng-click="setName()"
                   ng-keypress="checkEnter($event)" />
            <div id="createHelp" class="form-text mt-2">
              Use '/' to create folders. Example: /NoteDirA/Note1
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button"
                id="createNoteButton"
                class="btn btn-primary"
                ng-click="cloneNoteClick()">
          <span>
            Clone
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
