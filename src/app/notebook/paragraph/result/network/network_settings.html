<div class="row">
  <form>
    <fieldset class="row mb-3">
      <div class="col-3">
        <h4>Force Layout</h4>
      </div>
      <div class="col-9">
        <div class="row">
          <div class="col-auto">
            <label for="{{$id}}_timeout">
              Stop Force layout after
            </label>
            <div class="input-group">
              <input type="number"
                     class="form-control"
                     ng-model="config.d3Graph.forceLayout.timeout"
                     id="{{$id}}_timeout" />
              <span class="input-group-text">ms</span>
            </div>
          </div>
          <div class="col-auto">
            <label for="{{$id}}_charge">
              Force Layout Charge
            </label>
            <input type="number"
                   class="form-control"
                   ng-model="config.d3Graph.forceLayout.charge"
                   id="{{$id}}_charge" />
          </div>
          <div class="col-auto">
            <label for="{{$id}}_linkDistance">
              Force Layout Link Distance
            </label>
            <input type="number"
                   class="form-control"
                   ng-model="config.d3Graph.forceLayout.linkDistance"
                   id="{{$id}}_linkDistance" />
          </div>
        </div>
      </div>
    </fieldset>
    <fieldset class="row mb-3">
      <div class="col-3">
        <h4>Globals</h4>
      </div>
      <div class="col-auto">
        <label for="{{$id}}_charge">
          Minimum scale to show node and edge labels
        </label>
        <input type="number"
               class="form-control"
               ng-model="config.d3Graph.zoom.minScale"
               id="{{$id}}_minScale" />
      </div>
    </fieldset>
    <fieldset class="row mb-3">
      <div class="col-3">
        <h4>Node Labels</h4>
      </div>
      <div class="col-9">
        <!-- if no labels -->
        <div ng-if="isEmptyObject(config.properties)">
          No labels to set
        </div>
        <!-- if labels -->
        <div class="dropdown d-inline me-2"
             ng-repeat="(key, value) in config.properties track by key">
          <button type="button"
                  class="btn btn-secondary dropdown-toggle"
                  data-bs-toggle="dropdown"
                  aria-haspopup="true"
                  aria-expanded="false">
            {{key}}: <i>{{config.properties[key].selected}}</i>
          </button>
          <ul class="dropdown-menu">
            <li ng-repeat="val in value.keys">
              <a class="dropdown-item"
                 ng-click="setNetworkLabel(key, val)">
                <i ng-if="config.properties[key].selected == val"
                   class="fa-solid fa-check text-muted me-2"></i>
                {{val}}
              </a>
            </li>
          </ul>
        </div>
      </div>
    </fieldset>
    <fieldset class="text-end">
      <hr>
      <button type="submit"
              class="btn btn-primary btn-sm"
              ng-click="saveConfig()">
        <i class="fas fa-floppy-disk me-1"></i>
        Save
      </button>
    </fieldset>
  </form>
</div>
