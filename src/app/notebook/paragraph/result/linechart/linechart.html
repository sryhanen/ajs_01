<div ng-if="loaded">
  <div class="result-chart" ng-if="settingsOpen">
    <div ng-include src="'/app/shared/components/drag-drop/drag-drop.component.html'"></div>
    <div class="mt-4">
      <div class="form-check form-check-inline">
        <input class="form-check-input"
               type="checkbox"
               ng-model="configAdditions.forceY"
               ng-click="save()" />
        <label class="form-check-label">Force Y to 0</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input"
               type="checkbox"
               ng-model="configAdditions.lineWithFocus"
               ng-click="save()" />
        <label class="form-check-label">Zoom</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input"
               type="checkbox"
               ng-model="configAdditions.isDateFormat"
               ng-click="save()" />
        <label class="form-check-label">Date format</label>
      </div>
      <div class="d-inline-block" ng-show="configAdditions.isDateFormat">
        <input class="form-control"
               type="text"
               placeholder="YYYY-MM-DD HH:mm:ss"
               ng-model="configAdditions.dateFormat"
               ng-enter="instanceConfig.setDateFormat(configAdditions.dateFormat)"
               ng-blur="instanceConfig.setDateFormat(configAdditions.dateFormat)" />
      </div>
    </div>
    <div ng-include src="'/app/notebook/paragraph/result/visualization-displayXAxis.html'"></div>
  </div>
  <div class="table-display"
       callback
       id="{{containerID}}_viz">
  </div>
</div>
