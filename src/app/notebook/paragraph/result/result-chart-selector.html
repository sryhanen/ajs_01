<div class="result-view d-flex align-items-center flex-wrap">
    <div id="{{id}}_switch"
         ng-if="switcher"
         class="result-chart-selector me-2">
      <div class="btn-group">
        <button type="button" class="btn btn-light btn-sm"
                ng-repeat="viz in switcher track by $index"
                ng-class="{'active' : viz.id == activeViz}"
                ng-click="switchViz(viz.id)"
                title="{{viz.name ? viz.name : ''}}"
                ng-bind-html="viz.icon">
        </button>
      </div>
    </div>
    <!-- Download visuals -->
    <div class="dropdown me-2"
         ng-if="switcher && !asIframe && !viewOnly">
      <button type="button"
              class="btn btn-light btn-sm dropdown-toggle"
              data-bs-toggle="dropdown"
              title="Download Data as CSV"
              aria-expanded="false">
        <i class="fas fa-download"></i>
      </button>
      <ul class="dropdown-menu">
        <li>
          <a ng-click="exportToDSV(',')" class="dropdown-item">CSV</a>
        </li>
        <li>
          <a ng-click="exportToDSV('\t')" class="dropdown-item">TSV</a>
        </li>
      </ul>
    </div>
    <div class="ms-auto"
         ng-if="settings">
      <button class="btn btn-light btn-sm" ng-click="toggleGraphSetting()">
        <i class="fas fa-gear me-1"></i>
        <span ng-class="settingsOpen ? 'fas fa-chevron-down' : 'fas fa-chevron-right'"></span>
      </button>
    </div>
</div>
