<div class="row my-3">
  <label class="col-1 col-form-label">xAxis:</label>
  <div class="col-auto">
    <div class="btn-group">
      <button type="button"
              class="btn btn-secondary"
              ng-class="{'active' : instanceConfig.isXLabelStatus('default')}"
              ng-click="instanceConfig.changeXLabel('default'); save();" >
        Default
      </button>
      <button type="button"
              class="btn btn-secondary"
              ng-class="{'active' : instanceConfig.isXLabelStatus('rotate')}"
              ng-click="instanceConfig.changeXLabel('rotate');" >
        Rotate
      </button>
      <button type="button"
              class="btn btn-secondary"
              ng-class="{'active' : instanceConfig.isXLabelStatus('hide')}"
              ng-click="instanceConfig.changeXLabel('hide'); save();" >
        Hide
      </button>
    </div>
  </div>
</div>
<div class="row" ng-show="instanceConfig.isXLabelStatus('rotate')">
  <label class="col-1 col-form-label">Degree:</label>
  <div class="col-auto">
    <input type="text"
           class="form-control"
           placeholder="-45"
           ng-model="degree"
           ng-enter="instanceConfig.setDegree(degree); save();"
           ng-blur="instanceConfig.setDegree(degree); save();"
           ng-pattern="/^-?[0-9]{1,3}$/" />
  </div>
</div>
