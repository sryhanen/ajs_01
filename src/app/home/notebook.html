<div ng-controller="HomeCtrl as home">
  <div id="notebook-names">
    <div class="filter-names">
      <form>
        <span class="form-control-search">
          <i class="fas fa-magnifying-glass"></i>
        </span>
        <input type="text"
               class="note-name-query form-control"
               ng-click="$event.stopPropagation()"
               placeholder="Search a notebook"
               ng-model="$parent.query.q"
               ng-model-options="{ updateOn: 'default blur', debounce: { 'default': 300, 'blur': 0 } }" />
      </form>
    </div>
    <div ng-if="!query.q || query.q === ''">
      <div ng-repeat="node in home.notes.root.children"
          ng-include src="'/app/home/notebook-template.html'" ng-class="note_folder_renderer"></div>
    </div>
    <div ng-if="query.q">
      <div ng-repeat="node in home.notes.flatList | filter:query.q | orderBy:home.arrayOrderingSrv.noteFlatListOrdering"
          ng-include src="'/app/home/notebook-template.html'" ng-class="note_folder_renderer"></div>
    </div>
  </div>
</div>
